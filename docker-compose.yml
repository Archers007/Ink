services:
  ink:
    build: .
    image: ink:latest
    container_name: ink
    # Publish on the host. Change the published port with INK_PORT (the app
    # always listens on 3000 inside the container).
    ports:
      - "${INK_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      # Optional AI proxy. Leave blank to let the UI fall back to "bring your
      # own key". Values are interpolated from a local .env file if present.
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}"
    # Persist the downloaded cards.db / prices.db between restarts.
    volumes:
      - ink-cache:/app/cache
    restart: unless-stopped

  # Cloudflare Tunnel — exposes the app publicly without opening a port.
  # Configure the tunnel's public hostname to point at http://ink:3000 in the
  # Cloudflare Zero Trust dashboard (cloudflared reaches the app over the shared
  # compose network by its service name).
  #
  # The token is read from CLOUDFLARED_TOKEN in your local .env (never commit it).
  # To run Ink WITHOUT the tunnel:  docker compose up ink
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ink-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TOKEN:?set CLOUDFLARED_TOKEN in your .env}"
    depends_on:
      - ink
    restart: unless-stopped

volumes:
  ink-cache:
