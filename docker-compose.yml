services:
  ink:
    build: .
    image: ink:latest
    container_name: ink
    # Publish on the host. Change the published port with INK_PORT (the app
    # always listens on 3000 inside the container).
    ports:
      - "${INK_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      # Optional AI proxy. Leave blank to let the UI fall back to "bring your
      # own key". Values are interpolated from a local .env file if present.
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}"
    # Persist the downloaded cards.db / prices.db between restarts.
    volumes:
      - ink-cache:/app/cache
    restart: unless-stopped

volumes:
  ink-cache:
